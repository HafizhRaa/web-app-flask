<!DOCTYPE html>
<html>
<head>

        <a href="/" class="navbar-brand fw-bold">📄 To-Do List</a>

        <a href="/" class="text-secondary text-decoration-none">← Kembali</a>

                <p class="mb-0">{{ tugas['deskripsi'] or 'Belum ada deskripsi...' }}</p>
            </div>

        <div class="d-flex gap-2">
