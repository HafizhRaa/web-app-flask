<!DOCTYPE html>
<html>
<head>
    <title>To-List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">>
</head>
<body class="bg-dark text white min-vh-100">
        <nav class="navbar navbar-dark bg-black px-4">
            <span class="navbar-brand fw-bold">📝 To-Do-List</span>
            <div>
                <span class="text-secondary me-3">Halo, {{ username }}!</span>
                <a href="logout" class="btn-sm btn-danger">Logout</a>
            </div>
        </nav>

        <div class="container mt-5" style="max-width: 600px;">
            <form action="/tambah" method="post" class="d-flex gap-2 mb-4">
                <input type="text" name="nama" placeholder="Tambah tugas baru ..."
                    class="form-control bg-secondary text-white border-0" required>
                <button type="submit" class="btn btn-danger">Tambah</button>
            </form>

            {% for t in tugas %}
            <div class="card bg-secondary text-white border-0 mb-2">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <a href="/detail/{{ t['id'] }}" class="text-white text decoration-none">{{ t['nama'] }}</a>
                    <a href="/hapus/{{ t['id'] }}" class="btn btn-sm btn-danger">❌</a>
                </div>
            </div>
            {% endfor %}
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
