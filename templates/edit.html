<!DOCTYPE html>
<html>
<head>
    <title>Edit tugas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-dark text-white min-vh-100">
    <nav class="navbar navbar-dark bg-black px-4">
        <a href="/" class="navbar-brand fw-bold">📄 To-Do List</a>
    </nav>

    <div class="container mt-5" style="max-width: 600px;">
        <a href="/detal/{{ tugas['id'] }}" class="text-secondary text-decoration-none">← Kembali</a>
        <h2 class="mt-3 mb-4"> Edit Tugas ✏️</h2>

        <form action="/edit/{{  tugas['id'] }}" method="POST">
            <div class="mb-3">
                <input type="text" name="nama" value="{{ tugas['nama'] }}"
                        class="form-control bg-secondary text-white border-0 " required>

            </div>
            <div class="mb-3">
                <textarea name="deskripsi" rows="6"
                            class="form-control bg-secondary text-white border-0"
                            placeholder="Tulis Deskripsi..."> {{ tugas['deskripsi'] }}</textarea>
            </div>
            <button type="submit" class="btn btn-danger w-100">Simpan</button>
        </form>
    </div>
</body>
</html>
